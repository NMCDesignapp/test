<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPI BVNT An Giang</title>
    <meta name="theme-color" content="#0b0f14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KPI BVNT">
    <link rel="manifest" href="manifest.json">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
           --bg: #021616;
            --bg2: #032c2c;
            --bg-card: #171f2b;
            --fg: #f3efe7;
            --muted: #9a9184;
            --accent: #6cc78a;
            --accent-strong: #ffc505;
            --accent-glow: #b1a85552;
            --green: #659c6c;
            --red: #9f5f52;
            --blue: #7d8ca3;
            --border: #ffffff1a;
            --gold: #c6a56a;
            --track: #201a14;
            --track-fill: #d8bb86;
            --track-soft: #6f5740;
            --notice-h: 44px;
        }

        *, *::before, *::after { box-sizing: border-box; }
        button { border: none; background: none; padding: 0; margin: 0; font: inherit; color: inherit; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; }
        button:focus { outline: none; }
        button:focus-visible { outline: none; }
        
        body {
            background: var(--bg);
            font-family: Tahoma, Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--fg);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* --- BACKGROUND ANIMATION --- */
        .bg-scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(ellipse at 30% 20%, #0e2240 0%, var(--bg) 70%);
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .18;
            animation: orbFloat 18s ease-in-out infinite alternate;
            will-change: transform;
        }
        .bg-orb-1 { width: 500px; height: 500px; background: #091c36; top: -15%; left: -10%; }
        .bg-orb-2 { width: 400px; height: 400px; background: #0b1530; bottom: -10%; right: -10%; animation-delay: -6s; }
        .bg-orb-3 { width: 300px; height: 300px; background: #0d2040; top: 50%; left: 60%; animation-delay: -12s; }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.08); }
            100% { transform: translate(-15px, 15px) scale(.95); }
        }

        /* --- LAYOUT UTILITIES --- */
        .app-wrap {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 24px 16px 24px;
        }
        body.has-notice .app-wrap { padding-top: calc(24px + var(--notice-h) + 12px); }

        .view { display: none; animation: viewIn .4s ease-out; content-visibility: hidden; }
        .view.active { display: block; content-visibility: visible; }
        
        @keyframes viewIn {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TYPOGRAPHY --- */
        .hero-title {
            font-family: Tahoma, Arial, Helvetica, sans-serif;
            font-size: clamp(2rem, 7vw, 3rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, #dff4ff 28%, #8fd0ff 54%, #6cc78a 82%, #d7fff0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 8px 22px #8fd0ff22;
        }
        .hero-sub {
            font-size: 11px;
            font-weight: 800;
            color: #d9b65a;
            text-transform: uppercase;
            letter-spacing: .18em;
            margin-top: 4px;
        }

        /* --- CONTROLS --- */
        .ctrl-bar { display: flex; gap: 8px; margin-top: 20px; flex-wrap: nowrap; align-items: stretch; }
        
        .ctrl-select-wrap {
            position: relative;
            flex: 1 1 0;
            min-width: 0;
            width: auto;
        }
        .ctrl-select {
            width: 100%;
            height: 48px;
            padding: 0;
            border-radius: 12px;
            background: rgba(212, 168, 67, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid #d4a84373;
            color: #f2d38d;
            font-weight: 800;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            cursor: pointer;
            appearance: none;
            background-image: none;
            background-repeat: no-repeat;
            background-position: center;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .ctrl-select::before {
            content: '\f073';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 16px;
            color: #d4a843;
            line-height: 1;
        }
        .ctrl-date-pill {
            flex: 1 1 0;
            min-width: 0;
            height: 48px;
            padding: 0 14px;
            border-radius: 12px;
            background: rgba(212, 168, 67, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid #d4a84373;
            color: #f4e3b2;
            font-weight: 800;
            font-size: 13px;
            font-family: inherit;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: .04em;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ctrl-date-pill i { color: #d4a843; font-size: 13px; }
        .ctrl-date-pill .cdp-day { color: #f2c14e; font-weight: 900; font-size: 14px; }
        .ctrl-select-popup {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 280px;
            max-width: calc(100vw - 32px);
            background: #12223bcc;
            border: 1px solid #ffffff14;
            border-radius: 12px;
            box-shadow: 0 18px 36px #00000055;
            backdrop-filter: blur(12px);
            padding: 8px;
            display: none;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
            z-index: 30;
            max-height: 238px;
            overflow-y: auto;
        }
        .ctrl-select-wrap.open .ctrl-select-popup { display: grid; }
        .ctrl-select-opt {
            min-height: 34px;
            border-radius: 9px;
            border: 1px solid #ffffff10;
            background: #ffffff08;
            color: #dbe7f5;
            font-family: inherit;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s;
        }
        .ctrl-select-opt:hover { background: #ffffff14; color: #fff; border-color: #ffffff22; }
        .ctrl-select-opt.on {
            background: linear-gradient(135deg, var(--accent), #f59e0b);
            color: #000;
            border-color: #f4c261;
            box-shadow: 0 6px 18px #c6a56a45;
        }

        .btn-sync {
            flex: 1 1 0;
            height: 48px;
            padding: 0 8px;
            border-radius: 12px;
            border: 1px solid #d4a84373;
            cursor: pointer;
            background: rgba(212, 168, 67, 0.08);
            backdrop-filter: blur(8px);
            color: #f2d38d;
            font-weight: 900;
            font-size: 13px;
            font-family: inherit;
            transition: transform .15s, background .2s, border-color .2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-sync i { margin: 0 !important; color: #d4a843; }
        .btn-sync:hover,
        .ctrl-select:hover,
        .ctrl-date-pill:hover { background: rgba(212, 168, 67, 0.14); border-color: #e0ba62; transform: translateY(-1px); }
        .btn-sync:active { transform: scale(.96); }
        .btn-sync.loading { pointer-events: none; opacity: .7; }

        /* --- KPI CARDS (MAIN) --- */
        .kpi-stack { display: flex; flex-direction: column; gap: 8px; margin-top: 24px; }
        
        .kpi-card {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            transition: transform .25s ease, box-shadow .25s ease;
            cursor: default;
            contain: layout style paint;
        }
        .kpi-card:hover { transform: translateY(-2px); }

        .mini-progress {
            position: relative;
            width: 92px;
            height: 7px;
            margin-top: 10px;
            border-radius: 999px;
            overflow: hidden;
            background: linear-gradient(90deg, #241c15, #17120e);
            border: 1px solid #ffffff10;
            box-shadow: inset 0 1px 2px #00000040;
        }
        .mini-progress-fill {
            height: 100%;
            width: 0;
            border-radius: inherit;
            transition: width 1s cubic-bezier(.22, 1, .36, 1);
            background: linear-gradient(90deg, var(--track-soft), var(--track-fill));
            box-shadow: 0 0 12px #d8bb8633;
            will-change: width;
        }
        .mini-progress-cty { width: 108px; height: 8px; }
        .mini-progress-cty .mini-progress-fill { background: linear-gradient(90deg, #7f6242, #e0c48c); }
        .mini-progress-phong .mini-progress-fill { background: linear-gradient(90deg, #6f5740, #cfb07a); }
        .mini-progress-ad .mini-progress-fill { background: linear-gradient(90deg, #655345, #b9986b); }
        .kpi-card.glow-full {
            position: relative;
            box-shadow: 0 0 0 2px #f2d38d55, 0 18px 40px #00000052, 0 0 26px #f2d38d2e;
        }
        .kpi-card.glow-full::before,
         .kpi-ad.glow-full::before {
            content: 'HTKH';
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 4;
            padding: 4px 8px;
            border-radius: 999px;
            background: linear-gradient(135deg, #a8ffa8, #6fff6f);
            color: #2d5c26;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: .05em;
            box-shadow: 0 8px 18px #73f26e35;
        }

        /* Typography inside cards */
        .afyp-kh-row { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
        .afyp-big { font-weight: 900; line-height: 1.1; color: #fff; }
        .kh-small { font-weight: 400; color: #b7aa982e; font-size: 0.8em; }
        
        .subs-row {
            display: flex; gap: 0;
            border-top: 1px solid #ffffff0f;
            background: #0000001f;
            border-radius: 0 0 10px 10px;
        }
        .sub-pill {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 2px;
            padding: 4px 2px; background: #ffffff08;
            border-right: 1px solid #ffffff08;
        }
        .sub-pill:last-child { border-right: none; }
        .sub-label { font-weight: 600; color: #a79783; font-size: 8px; letter-spacing: .01em; }
        .sub-num { font-weight: 900; color: #f3efe7; }

        /* Company Card Specifics */
        #kpi-company { margin-top: 32px; }
        .kpi-cty {
            background: linear-gradient(180deg, #1b2f49, #172a43);
            border: 1.5px solid #d6a34866;
            border-top: 4px solid #f2b24d;
            box-shadow: 0 20px 50px #0000005c, inset 0 1px 0 #ffffff14;
            padding: 18px 20px 22px; margin-bottom: 10px;
        }
        .kpi-cty.glow-full {
            border-color: #f2d38d;
            background: linear-gradient(180deg, #243a58, #1b2f49);
            box-shadow: 0 0 0 2px #f2d38d6b, 0 24px 54px #00000066, 0 0 34px #f2d38d38, inset 0 1px 0 #ffffff1f;
        }
        .kpi-cty.glow-full .cty-pct-num,
        .kpi-cty.glow-full .cty-name { color: #ffe0a3; }
        .kpi-cty.glow-full .cty-progress { box-shadow: inset 0 1px 2px #00000033, 0 0 0 1px #ffe1a433; }
        .cty-inner { position: relative; z-index: 1; }
        .cty-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .cty-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            color: #ff9f2f;
            letter-spacing: .02em;
        }
        .cty-name i { color: #ffc46b; font-size: 16px; }
        .cty-pct-num { font-size: clamp(2rem, 6vw, 2.5rem); font-weight: 900; line-height: 1; color: #e0c48c; }
        .cty-body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(180px, 340px);
            gap: 18px;
            align-items: center;
        }
        .cty .afyp-big { font-size: clamp(2rem, 6vw, 2.7rem); color: #ffffff; }
        .cty .kh-small { font-size: clamp(.8rem, 2vw, 1rem); color: #5a83b8; font-weight: 700; }
        .cty-progress {
            width: 100%;
            height: 22px;
            border-radius: 999px;
            background: #9cc6f04d;
            overflow: hidden;
            box-shadow: inset 0 1px 2px #00000033;
        }
        .cty-progress-fill {
            height: 100%;
            width: 0;
            border-radius: inherit;
            transition: width 1s cubic-bezier(.22, 1, .36, 1);
            background: linear-gradient(90deg, #11b76f, #16cb74);
            box-shadow: inset -1px 0 0 #ffffff24;
            will-change: width;
        }
        .cty-progress-fill::after {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(90deg, #ffffff12 0 18%, transparent 18% 22%);
        }
        .cty-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 18px;
        }
        .cty-stat {
            border-radius: 16px;
            padding: 11px 8px 10px;
            text-align: center;
            border: 1px solid #ffffff0d;
            box-shadow: inset 0 1px 0 #ffffff08;
        }
        .cty-stat-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #9db3d2;
        }
        .cty-stat-val { font-size: 26px; font-weight: 900; line-height: 1; }
        .cty-stat.hd { background: #233f64; }
        .cty-stat.hd .cty-stat-val { color: #7fc2ff; }
        .cty-stat.td { background: #3a345f; }
        .cty-stat.td .cty-stat-val { color: #d8b7ff; }
        .cty-stat.chuan { background: #0e4453; }
        .cty-stat.chuan .cty-stat-val { color: #16e0d3; }
        .cty-stat.ip { background: #4b3825; }
        .cty-stat.ip .cty-stat-val { color: #ffd789; }
        @media (max-width: 640px) {
            .cty-body { grid-template-columns: 1fr; gap: 14px; }
            .cty-progress { height: 20px; }
            .cty-stats { gap: 8px; }
            .cty-stat-label { font-size: 9px; }
            .cty-stat-val { font-size: 20px; }
            .cty-pct-num { color: #f2d38d; }
        }

        /* Department Card Specifics */
        .kpi-phong {
            background: linear-gradient(180deg, #20457a, #1b3d70);
            border: 1px solid #5ca2ec55; margin-top: 20px;
            box-shadow: 0 12px 26px #00000030, inset 0 1px 0 #ffffff10; padding: 16px 18px 18px; border-radius: 18px;
        }
        .kpi-phong.glow-full {
            border-color: #ffd58c;
            background: linear-gradient(180deg, #2a538a, #214674);
            box-shadow: 0 0 0 2px #ffd58c55, 0 18px 34px #00000042, 0 0 28px #ffd58c2c, inset 0 1px 0 #ffffff14;
        }
        .kpi-phong.glow-full .phong-pct,
        .kpi-phong.glow-full .phong-name { color: #ffe1ad; }
        .kpi-phong.glow-full .phong-progress { box-shadow: inset 0 1px 2px #00000033, 0 0 0 1px #ffe1a433; }
        .phong-inner { position: relative; z-index: 1; }
        .phong-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .phong-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            color: #d9ebff;
        }
        .phong-name i { color: #ffcf8a; font-size: 15px; }
        .phong-pct { font-size: 19px; font-weight: 900; color: #e0c48c; white-space: nowrap; }
        .phong-body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(160px, 280px);
            gap: 16px;
            align-items: center;
        }
        .phong .afyp-big { font-size: clamp(1.9rem, 5vw, 2.4rem); color: #ffffff; }
        .phong .kh-small { font-size: clamp(.8rem, 2vw, .95rem); color: #7da6d9; font-weight: 700; }
        .phong-progress {
            width: 100%;
            height: 22px;
            border-radius: 999px;
            overflow: hidden;
            background: #f3dcc04d;
            box-shadow: inset 0 1px 2px #00000033;
        }
        .phong-progress-fill {
            width: 0;
            height: 100%;
            border-radius: inherit;
            transition: width 1s cubic-bezier(.22, 1, .36, 1);
            background: linear-gradient(90deg, #ff941f, #ff9f2b);
            will-change: width;
        }
        .phong-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .phong-stat {
            border-radius: 16px;
            padding: 11px 8px 10px;
            text-align: center;
            border: 1px solid #ffffff0d;
            box-shadow: inset 0 1px 0 #ffffff08;
        }
        .phong-stat-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #9fc0e2;
        }
        .phong-stat-val { font-size: 25px; font-weight: 900; line-height: 1; }
        .phong-stat.hd { background: #264f87; }
        .phong-stat.hd .phong-stat-val { color: #9bd0ff; }
        .phong-stat.td { background: #3f4389; }
        .phong-stat.td .phong-stat-val { color: #f0b8ff; }
        .phong-stat.chuan { background: #0d5b72; }
        .phong-stat.chuan .phong-stat-val { color: #18e0e7; }
        .phong-stat.ip { background: #635136; }
        .phong-stat.ip .phong-stat-val { color: #ffd07f; }
        .kpi-phong.banca .phong-body { grid-template-columns: 1fr; }
        .kpi-phong.banca .phong-stats { grid-template-columns: repeat(3, 1fr); }
        .kpi-phong.banca { cursor: pointer; transition: box-shadow .22s, transform .22s, border-color .22s; }
        .kpi-phong.banca:hover { transform: translateY(-1px); }
        .kpi-phong.banca.open { border-color: #9fc5ef; box-shadow: 0 0 0 1px #9fc5ef5c, 0 18px 34px #00000042, inset 0 1px 0 #ffffff14; }
        .phong-drill {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #ffffff14;
        }
        .kpi-phong.banca.open .phong-drill { display: block; }
        @media (max-width: 640px) {
            .kpi-phong {
                margin-top: 14px;
                padding: 12px 13px 13px;
                border-radius: 15px;
                border: 1.5px solid #8bc3ba;
                border-top: 3px solid #a9ddd5;
                box-shadow: 0 0 0 1px #6ea9a080, 0 10px 22px #0613218a, 0 0 28px #7fc9ba30, inset 0 1px 0 #ffffff0f;
            }
            .phong-head { gap: 10px; margin-bottom: 9px; }
            .phong-name { font-size: 11px; gap: 7px; }
            .phong-name i { font-size: 13px; }
            .phong-pct { font-size: 16px; color: #f2d38d; }
            .phong-body { grid-template-columns: 1fr; gap: 10px; }
            .phong .afyp-big { font-size: 1.55rem; }
            .phong .kh-small { font-size: .75rem; }
            .phong-progress { height: 12px; }
            .phong-stats { gap: 7px; margin-top: 11px; }
            .phong-stat { border-radius: 12px; padding: 9px 7px 8px; }
            .phong-stat-label { font-size: 9px; margin-bottom: 5px; }
            .phong-stat-val { font-size: 17px; }
            .phong-drill { margin-top: 10px; padding-top: 10px; }
        }

        /* Advisor Grid */
        .ad-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; margin-bottom: 8px; }
        
        .kpi-ad {
            background: linear-gradient(180deg, #edf4fb, #dfeaf6);
            border: 1px solid #b6c9de;
            box-shadow: 0 6px 16px #0000001a;
            border-radius: 18px; padding: 8px 12px 6px;
            cursor: pointer;
            transition: box-shadow .22s, transform .22s, border-color .22s;
            contain: layout style paint;
        }
        .kpi-ad:hover { transform: translateY(-1px); box-shadow: 0 10px 22px #0000001f; }
        .kpi-ad.open { border-color: #7b9fcb; box-shadow: 0 0 0 1px #9ab8db5e, 0 12px 28px #00000024; }
        .kpi-ad.glow-full {
            border-color: #f2c46e;
            background: linear-gradient(180deg, #fff6e6, #ecf2f8);

            s = s.replace(/\s/g, '').replace(/%/g, '');

                if (s.lastIndexOf(',') > s.lastIndexOf('.')) {

        function collectManagedGroups(rows, adKey, managerName) {

                var maSo = String(row.ma_so || '').trim();

                for (var m = 1; m <= 12; m++) {

                var rank = roleRank(chucVu);

            });

            return Object.keys(map).sort(function(a, b) {

        function parseNgayCap(str) {
            if (!str) return null;
            var s = String(str).trim();
            if (!s) return null;
            // Try DD/MM/YYYY or DD-MM-YYYY first
            var m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
            if (m) {
                var d = parseInt(m[1], 10), mo = parseInt(m[2], 10), y = parseInt(m[3], 10);
                if (y < 100) y += 2000;
                if (mo >= 1 && mo <= 12 && y > 1900) return { year: y, month: mo };
            }
            // Try YYYY-MM-DD
            m = s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
            if (m) {
                var y2 = parseInt(m[1], 10), mo2 = parseInt(m[2], 10);
                if (mo2 >= 1 && mo2 <= 12 && y2 > 1900) return { year: y2, month: mo2 };
            }
            // Fallback: native Date
            var dt = new Date(s);
            if (!isNaN(dt.getTime())) return { year: dt.getFullYear(), month: dt.getMonth() + 1 };
            return null;
        }
        function computeGroupStats(members) {
            var total = 0, luotHD = 0, luotHDChuan = 0, tvvMoi = 0;
            var nowY = NOW.getFullYear(), nowM = NOW.getMonth() + 1;
            (members || []).forEach(function(m) {
                total++;
                // Lượt HD: count months (in displayed 6 months) where IP >= 3 (triệu)
                // Lượt HD chuẩn: same but IP >= 12 (triệu)
                var months = m.months || [];
                for (var i = 0; i < 6; i++) {
                    var v = +months[i] || 0;
                    if (v >= 3) luotHD++;
                    if (v >= 12) luotHDChuan++;
                }
                // TVVm (<12t): any member with ngayCap within 12 months from today (count by month, not day)
                var d = parseNgayCap(m.ngayCap);
                if (d) {
                    var diff = (nowY - d.year) * 12 + (nowM - d.month);
                    if (diff >= 0 && diff <= 12) tvvMoi++;
                }
            });
            return { total: total, luotHD: luotHD, luotHDChuan: luotHDChuan, tvvMoi: tvvMoi };
        }

        function formatKyLabel(ky) {

            if (/(?:H1|6T)$/i.test(v)) return '6T';
            if (/(?:Y|NAM|NĂM)$/i.test(v)) return 'Năm';
            if (/^\d{4}-\d{2}$/.test(v) && monthMatch) return monthMatch[1];
            if (/^\d{2}$/.test(v)) return v;
            return v.replace(/^\d{4}-/, '');
        }

        /* ================= CALENDAR VIEW LOGIC ================= */
        function renderCalendar() {
            var box = $('calendar-body');
            var t = timeState.calendar;
            var selMonths = [];

            if (!isNaN(t)) {
                selMonths = [String(parseInt(t)).padStart(2, '0')];
            } else if (t === 'Y') {
                selMonths = MONTHS.slice();
            } else {
                var f = FUNCS.find(function(x) { return x.id === t; });
                if (f) selMonths = f.ms.slice();
            }

            var rows = DATA.filter(function(x) {
                if (!x.thangkh) return false;
                var m = String(parseInt(x.thangkh)).padStart(2, '0');
                return selMonths.indexOf(m) !== -1;
            }).sort(function(a, b) { return num(a.ngay_kh) - num(b.ngay_kh); });

            if (!selMonths.length) {
                box.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--muted);font-style:italic;font-size:13px">Chưa có kế hoạch cho kỳ này</div>';
                return;
            }

            var month = selMonths[0];
            var monthNum = parseInt(month, 10);
            var daysInMonth = new Date(CUR_YEAR, monthNum, 0).getDate();
            var weekdayNames = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
            var byDay = {};
            var htmlParts = [];

            rows.forEach(function(r) {
                var day = num(r.ngay_kh);
                if (!day || day < 1 || day > daysInMonth) return;
                if (!byDay[day]) byDay[day] = [];
                byDay[day].push(r);
            });

            for (var day = 1; day <= daysInMonth; day++) {
                var dateObj = new Date(CUR_YEAR, monthNum - 1, day);
                var weekday = dateObj.getDay();
                var plans = byDay[day] || [];
                var isToday = day === NOW.getDate() && month === CUR_MONTH;
                var rowCls = ['cal-row'];
                if (isToday) rowCls.push('is-today');
                if (weekday === 6 || weekday === 0) rowCls.push('is-weekend');
                if (weekday === 0) rowCls.push('is-sunday');

                var contentHtml = plans.length? plans.map(function(r) {
                    return '<span class="cal-line">' + esc(r.noi_dung || '') + '</span>';
                }).join('') : '<span class="cal-empty"></span>';

                var ownerMap = {}, owners = [];
                plans.forEach(function(r) {
                    var owner = '';
                    // First try: look for a dedicated "Phụ trách" column
                    for (var k in r) {
                        if (!r.hasOwnProperty(k)) continue;
                        var nk = String(k).toLowerCase();
                        if (nk.indexOf('trach') !== -1 || nk === 'p_trach' || nk === 'p/trach' || nk === 'phu' || nk.indexOf('nguoi_phu') !== -1 || nk === 'pt' || nk.indexOf('phu_trach') !== -1 || nk.indexOf('p_tr') !== -1 || nk === 'ptrach' || nk === 'nguoi_thuc_hien') {
                            var v = String(r[k] || '').trim();
                            if (v) { owner = v; break; }
                        }
                    }
                    // Fallback: use phong_ban if no dedicated "Phụ trách" column found
                    if (!owner && r.phong_ban) {
                        owner = String(r.phong_ban).trim();
                    }
                    if (owner && !ownerMap[owner]) {
                        ownerMap[owner] = true;
                        owners.push(owner);
                    }
                });
                var ownerHtml = owners.length? owners.map(function(owner) {
                    return '<span class="cal-line">' + esc(owner) + '</span>';
                }).join('') : '';

                htmlParts.push('<div class="' + rowCls.join(' ') + '" style="animation-delay:' + ((day - 1) * 22) + 'ms">' +
                    '<div class="cal-day"><span class="cal-day-num">' + day + '</span><span class="cal-day-week">' + weekdayNames[weekday] + '</span></div>' +
                    '<div class="cal-text">' + contentHtml + '</div>' +
                    '<div class="cal-owner">' + ownerHtml + '</div>' +
                    '</div>');
            }
            box.innerHTML = htmlParts.join('');
        }

        function TD_csv(text) { if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1); return Papa.parse(text, { header: false, skipEmptyLines: 'greedy' }).data; }
        function TD_fd(d) { if (!d) return '--'; var p = d.split('-'); return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : d; }
        function TD_fdi(d) { if (!d) return ''; var p = d.split('/'); if (p.length === 3 && p[2].length === 4) return p[2] + '-' + p[1].padStart(2, '0') + '-' + p[0].padStart(2, '0'); if (d.indexOf('-') !== -1) return d; return ''; }
        function TD_fdo(d) { if (!d) return ''; var p = d.split('-'); if (p.length === 3) return p[2] + '/' + p[1] + '/' + p[0]; return d; }
        function TD_ced(rc, dc) {
            var c = 0;
            for (var i = 0; i < dc; i++) {
                var val = String(rc[i] || '').trim().toLowerCase();
                if (val === 'đạt' || val === '10000001111') c++;
            }
            return c;
        }
        async function TD_fetchText(urls) {
            var lastErr = new Error('Không tải được dữ liệu');
            for (var i = 0; i < urls.length; i++) {
                try {
                    var res = await fetch(urls[i], { cache: 'no-store' });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    var text = await res.text();
                    if (text && text.trim()) return text;
                } catch (e) {
                    lastErr = e;
                }
            }
            throw lastErr;
        }

        async function TD_fetchSheetLayout(sheetName, cols, rows) {
            var url = TD_SCR + '?action=getSheetLayout&sheet=' + encodeURIComponent(sheetName) + '&cols=' + encodeURIComponent(cols || '') + '&rows=' + encodeURIComponent(rows || '');
            var res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            var data = await res.json();
            if (!data || !data.ok || !data.headers || !data.rows) throw new Error('Layout unavailable');
            return data;
        }

        function TD_renderSheetLayout(ct, payload) {
            function escCell(v) { return esc(v == null ? '' : String(v)); }
            function renderHeaderRows(headers) {
                return headers.map(function(row) {
                    var html = '<tr>';
                    row.forEach(function(cell) {
                        if (!cell || cell.skip) return;
                        var text = escCell(cell.text);
                        var cls = cell.className ? ' class="' + escCell(cell.className) + '"' : '';
                        var rs = cell.rowspan > 1 ? ' rowspan="' + Number(cell.rowspan) + '"' : '';
                        var cs = cell.colspan > 1 ? ' colspan="' + Number(cell.colspan) + '"' : '';
                        html += '<th' + cls + rs + cs + '>' + text + '</th>';
                    });
                    html += '</tr>';
                    return html;
                }).join('');
            }
            function renderBodyRows(rows) {
                return rows.map(function(row, rowIdx) {
                    var html = '<tr data-row-index="' + rowIdx + '">';
                    row.forEach(function(cell) {
                        if (!cell || cell.skip) return;
                        var cls = cell.className ? ' class="' + escCell(cell.className) + '"' : '';
                        var rs = cell.rowspan > 1 ? ' rowspan="' + Number(cell.rowspan) + '"' : '';
                        var cs = cell.colspan > 1 ? ' colspan="' + Number(cell.colspan) + '"' : '';
                        html += '<td' + cls + rs + cs + '>' + escCell(cell.text) + '</td>';
                    });
                    html += '</tr>';
                    return html;
                }).join('');
            }

            ct.innerHTML = '<div class="ptw"><table class="pt"><thead>' + renderHeaderRows(payload.headers) + '</thead><tbody>' + renderBodyRows(payload.rows) + '</tbody></table></div>';

            /* Fix sticky top for 2nd+ header rows */
            function fixStickyTop() {
                var thead = ct.querySelector('thead');
                if (thead && thead.rows.length > 1) {
                    var cumTop = 0;
                    for (var r = 0; r < thead.rows.length; r++) {
                        var rowH = thead.rows[r].getBoundingClientRect().height;
                        if (r > 0 && rowH > 0) {
                            var cells = thead.rows[r].cells;
                            for (var c = 0; c < cells.length; c++) {
                                cells[c].style.top = cumTop + 'px';
                            }
                        }
                        cumTop += rowH;
                    }
                }
            }
            requestAnimationFrame(function() { requestAnimationFrame(fixStickyTop); });
            setTimeout(fixStickyTop, 300);
            setTimeout(fixStickyTop, 800);

            ct.querySelectorAll('tbody tr').forEach(function(row) {
                row.addEventListener('click', function() {
                    ct.querySelectorAll('tbody tr.is-focus').forEach(function(activeRow) {
                        activeRow.classList.remove('is-focus');
                    });
                    row.classList.add('is-focus');
                });
            });
        }

        /* Compact group filter pinned to top-right of each table wrapper.
           groupColIdx = 0-based data column index of the "nhom" column,
           tdOffset    = number of leading <td> in tbody rows before data cells (1 if STT auto-prepended, 0 otherwise). */
        function TD_attachGroupFilter(ct, groupColIdx, tdOffset) {
            if (groupColIdx == null || groupColIdx < 0) return;
            if (tdOffset == null) tdOffset = 1;
            var wraps = ct.querySelectorAll('.ptw, .po-ptw');
            wraps.forEach(function(wrap) {
                var table = wrap.querySelector('table');
                if (!table || !table.tBodies.length) return;
                var tbody = table.tBodies[0];
                var rows = Array.prototype.slice.call(tbody.rows);
                if (rows.length < 2) return;
                var tdIdx = groupColIdx + tdOffset;
                var counts = {};
                rows.forEach(function(tr) {
                    var td = tr.cells[tdIdx];
                    if (!td) return;
                    var v = (td.textContent || '').trim();
                    if (v) counts[v] = (counts[v] || 0) + 1;
                });
                var keys = Object.keys(counts).sort(function(a, b) { return a.localeCompare(b, 'vi'); });
                if (keys.length < 2) return;
                /* Remove any previous filter bar that belongs to this wrapper */
                var prev = wrap.previousElementSibling;
                if (prev && prev.classList && prev.classList.contains('tbl-filter-bar')) prev.remove();
                var holder = document.createElement('div');
                holder.className = 'tbl-filter-bar';
                var pill = document.createElement('div');
                pill.className = 'tbl-filter';
                var optsHtml = '<option value="">Tất cả nhóm</option>';
                keys.forEach(function(k) {
                    optsHtml += '<option value="' + esc(k) + '">' + esc(k) + ' (' + counts[k] + ')</option>';
                });
                pill.innerHTML = '<i class="fa-solid fa-filter"></i><select aria-label="Lọc theo nhóm">' + optsHtml + '</select>';
                holder.appendChild(pill);
                wrap.parentNode.insertBefore(holder, wrap);
                var sel = pill.querySelector('select');
                sel.addEventListener('change', function() {
                    var v = sel.value;
                    pill.classList.toggle('active', !!v);
                    rows.forEach(function(tr) {
                        var td = tr.cells[tdIdx];
                        if (!v) { tr.style.display = ''; return; }
                        tr.style.display = (td && (td.textContent || '').trim() === v) ? '' : 'none';
                    });
                });
                sel.addEventListener('click', function(e) { e.stopPropagation(); });
            });
        }

        /* ===== CLB Custom Render with Rank Group Headers ===== */
        function TD_renderCLB(ct, csv, cols, rows, sheetName) {
            var all = TD_csv(csv);
            if (!all.length || all.length < 2) {
                ct.innerHTML = '<div style="text-align:center;padding:40px;color:var(--td-fgm)">Tab trống</div>';
                return;
            }

            /* Define rank configs per CLB sheet */
            var rankConfigs = {
                'CLB-TNKTM': {
                    infoCols: 3,  /* NHÓM KD, MSĐL, HỌ TÊN TN */
                    dataColsBeforeRanks: 1, /* FYP NHÓM lũy kế */
                    ranks: [
                        { name: 'Hạng vàng', color: '#fef0b0', headerColor: '#f9a825', cols: 1 },
                        { name: 'Hạng bạch kim', color: '#d1d5f0', headerColor: '#5c6bc0', cols: 1 },
                        { name: 'Hạng kim cương', color: '#f5c2d4', headerColor: '#e91e63', cols: 1 }
                    ]
                },
                'CLB-TNTD': {
                    infoCols: 3,  /* NHÓM KD, MSĐL, HỌ TÊN TN */
                    dataColsBeforeRanks: 2, /* TVVm HĐC lũy kế, FYP NHÓM lũy kế */
                    ranks: [
                        { name: 'Hạng vàng', color: '#fef0b0', headerColor: '#f9a825', cols: 2 },
                        { name: 'Hạng bạc kim', color: '#e0d4f5', headerColor: '#7e57c2', cols: 2 }
                    ]
                },
                'CLB-CN': {
                    infoCols: 3,  /* NHÓM KD, MÃ SỐ, HỌ TÊN TVV */
                    dataColsBeforeRanks: 2, /* FYP lũy kế, IP THÁNG 4 */
                    ranks: [
                        { name: 'Hạng vàng', color: '#fef0b0', headerColor: '#f9a825', cols: 1 },
                        { name: 'Hạng bạch kim', color: '#d1d5f0', headerColor: '#5c6bc0', cols: 1 },
                        { name: 'Hạng kim cương', color: '#f5c2d4', headerColor: '#e91e63', cols: 1 }
                    ]
                }
            };

            var cfg = rankConfigs[sheetName];
            if (!cfg) {
                /* Fallback: use default rpt */
                var defaultRpt = createTDPage._defaultRpt;
                if (defaultRpt) defaultRpt(ct, csv, cols, rows);
                else ct.innerHTML = '<div style="text-align:center;padding:40px;color:var(--td-fgm)">Chưa hỗ trợ sheet này</div>';
                return;
            }

            var hd = all[0] || [];
            var dc = Math.min(hd.length, cols || 99);
            /* Trim trailing empty columns */
            while (dc > 0) {
                var anyData = false;
                for (var rr = 1; rr < all.length; rr++) {
                    var cv = all[rr] && all[rr][dc - 1];
                    if (cv != null && String(cv).trim() !== '') { anyData = true; break; }
                }
                if (anyData || String(hd[dc - 1] || '').trim()) break;
                dc--;
            }

            var data = all.slice(1);
            /* Sort by achievement (rows with more "Đạt" / 10000001111 come first) */
            var si = [];
            for (var r = 0; r < data.length; r++) si.push(r);
            si.sort(function(a, b) { return TD_ced(data[b] || [], dc) - TD_ced(data[a] || [], dc); });

            /* Build header with grouped rank columns */
            var rankStart = cfg.infoCols + cfg.dataColsBeforeRanks;
            var headerRow1 = '<tr><th rowspan="2" class="mini-col" style="text-align:center">STT</th>';
            /* Info columns */
            for (var ic = 0; ic < cfg.infoCols; ic++) {
                var infoH = String(hd[ic] || '').trim();
                var infoKey = infoH.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[đĐ]/g, 'd').replace(/[^a-z0-9]+/g, ' ').trim();
                var isCode = /(ma so|msdl|ms dl|ms dai ly|ma tn|^ma$|^ms$)/.test(infoKey);
                var infoCls = isCode ? 'col-code clb-info-ms' : 'col-name clb-info-left';
                headerRow1 += '<th rowspan="2" class="' + infoCls + '">' + esc(infoH) + '</th>';
            }
            /* Data columns before ranks */
            for (var dc2 = 0; dc2 < cfg.dataColsBeforeRanks; dc2++) {
                var dataH = String(hd[rankStart - cfg.dataColsBeforeRanks + dc2] || '').trim();
                headerRow1 += '<th rowspan="2" class="num-col col-thuong">' + esc(dataH) + '</th>';
            }
            /* Rank group headers (row 1) */
            for (var ri = 0; ri < cfg.ranks.length; ri++) {
                var rank = cfg.ranks[ri];
                headerRow1 += '<th colspan="' + rank.cols + '" class="clb-rank-hdr" style="background:' + rank.headerColor + '">' + esc(rank.name) + '</th>';
            }
            headerRow1 += '</tr>';

            /* Rank sub-headers (row 2) */
            var headerRow2 = '<tr>';
            for (var ri2 = 0; ri2 < cfg.ranks.length; ri2++) {
                var rank2 = cfg.ranks[ri2];
                /* Find the starting column index for this rank */
                var rankColStart = rankStart;
                for (var rp = 0; rp < ri2; rp++) rankColStart += cfg.ranks[rp].cols;
                for (var rc = 0; rc < rank2.cols; rc++) {
                    var subH = String(hd[rankColStart + rc] || '').trim();
                    headerRow2 += '<th class="clb-rank-sub-hdr" style="background:' + rank2.headerColor + '">' + esc(subH) + '</th>';
                }
            }
            headerRow2 += '</tr>';

            /* Build body */
            var body = '';
            for (var k = 0; k < si.length; k++) {
                var rowIndex = si[k], row = data[rowIndex] || [];
                body += '<tr><td class="pst">' + (rowIndex + 1) + '</td>';
                /* Info columns */
                for (var ic2 = 0; ic2 < cfg.infoCols; ic2++) {
                    var infoVal = String(row[ic2] || '').trim();
                    var iKey = String(hd[ic2] || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[đĐ]/g, 'd').replace(/[^a-z0-9]+/g, ' ').trim();
                    if (/(ma so|msdl|ms dl|ms dai ly|ma tn|^ma$|^ms$)/.test(iKey)) {
                        body += '<td class="td-text col-code clb-info-ms">' + esc(infoVal) + '</td>';
                    } else {
                        body += '<td class="td-text col-name clb-info-left">' + esc(infoVal) + '</td>';
                    }
                }
                /* Data columns before ranks */
                for (var dc3 = 0; dc3 < cfg.dataColsBeforeRanks; dc3++) {
                    var dataVal = String(row[cfg.infoCols + dc3] || '').trim();
                    var compact = dataVal.replace(/\s/g, '');
                    var isNum = /^-?\d+(?:[.,]\d+)?$/.test(compact);
                    var displayVal = dataVal;
                    if (isNum) {
                        var n = Number(compact.replace(/\./g, '').replace(',', '.'));
                        if (isFinite(n)) displayVal = n.toLocaleString('vi-VN');
                    }
                    body += '<td class="td-num col-thuong-cell">' + esc(displayVal) + '</td>';
                }
                /* Rank columns with colored backgrounds */
                var rankColIdx = rankStart;
                for (var ri3 = 0; ri3 < cfg.ranks.length; ri3++) {
                    var rank3 = cfg.ranks[ri3];
                    for (var rc2 = 0; rc2 < rank3.cols; rc2++) {
                        var rankVal = String(row[rankColIdx] || '').trim();
                        var rankDisplay = rankVal;
                        var rankCompact = rankVal.replace(/\s/g, '');
                        var rankIsNum = /^-?\d+(?:[.,]\d+)?$/.test(rankCompact);
                        if (rankIsNum) {
                            var rn = Number(rankCompact.replace(/\./g, '').replace(',', '.'));
                            if (isFinite(rn)) rankDisplay = rn.toLocaleString('vi-VN');
                        }
                        var cellCls = 'td-num clb-rank-cell';
                        var cellStyle = 'background:' + rank3.color + ' !important;';
                        if (rankVal === '10000001111') {
                            rankDisplay = '<span class="ach-pill"><i class="fa-solid fa-circle-check" style="margin-right:3px"></i>Đạt</span>';
                            cellCls += ' ach-cell';
                        } else if (rankVal.toLowerCase() === 'đạt' || rankVal.toLowerCase() === 'đạt danh hiệu') {
                            rankDisplay = '<span class="dat-badge"><i class="fa-solid fa-circle-check" style="margin-right:3px"></i>' + esc(rankDisplay) + '</span>';
                            cellCls += ' cell-dat';
                        } else if (rankIsNum && Number(rankCompact.replace(/\./g, '').replace(',', '.')) < 0) {
                            cellStyle += 'color:#b91c1c;';
                        }
                        body += '<td class="' + cellCls + '" style="' + cellStyle + '">' + rankDisplay + '</td>';
                        rankColIdx++;
                    }
                }
                body += '</tr>';
            }

            /* Build colgroup for column widths - rank columns equal */
            var cgHtml = '<colgroup><col style="width:28px">';
            for (var ci = 0; ci < cfg.infoCols; ci++) {
                var cKey = String(hd[ci] || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[đĐ]/g, 'd').replace(/[^a-z0-9]+/g, ' ').trim();
                cgHtml += (/(ma so|msdl|ms dl|ms dai ly|ma tn|^ma$|^ms$)/.test(cKey)) ? '<col style="width:90px">' : '<col>';
            }
            for (var di = 0; di < cfg.dataColsBeforeRanks; di++) cgHtml += '<col>';
            var totalRankCols = 0;
            for (var rci = 0; rci < cfg.ranks.length; rci++) totalRankCols += cfg.ranks[rci].cols;
            for (var rci2 = 0; rci2 < totalRankCols; rci2++) cgHtml += '<col class="clb-rank-eq">';
            cgHtml += '</colgroup>';
            var tableHtml = '<div class="ptw auto-wide"><table class="pt">' + cgHtml + '<thead>' + headerRow1 + headerRow2 + '</thead><tbody>' + body + '</tbody></table></div>';
            ct.innerHTML = tableHtml;

            /* Fix sticky top for 2nd header row */
            function fixCLBSticky() {
                var thead = ct.querySelector('thead');
                if (thead && thead.rows.length > 1) {
                    var cumTop = 0;
                    for (var r = 0; r < thead.rows.length; r++) {
                        var rowH = thead.rows[r].getBoundingClientRect().height;
                        if (r > 0 && rowH > 0) {
                            var cells = thead.rows[r].cells;
                            for (var c = 0; c < cells.length; c++) {
                                cells[c].style.top = cumTop + 'px';
                            }
                        }
                        cumTop += rowH;
                    }
                }
            }
            requestAnimationFrame(function() { requestAnimationFrame(fixCLBSticky); });
            setTimeout(fixCLBSticky, 300);
        }
