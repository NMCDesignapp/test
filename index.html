                   10=TỶ LỆ THƯỞNG (tạm tính), 11=FYC Giả định TLHH 25%, 12=TIỀN THƯỞNG (Tạm tính) */
                /* Find the achieved tier: highest non-empty tier column (5-9) */
                var achievedTier = -1;
                for (var ti = 9; ti >= 5; ti--) {
                    var tv = String(r[ti] || '').trim();
                    if (tv && tv !== '0' && tv !== '0%') { achievedTier = ti; break; }
                }

                bHtml += '<tr>' +
                    '<td class="pst">' + (idx + 1) + '</td>' +
                    '<td class="td-text col-name">' + esc(String(r[0] || '').trim()) + '</td>' +
                    '<td class="td-text col-code">' + esc(String(r[1] || '').trim()) + '</td>' +
                    '<td class="td-text col-name">' + esc(String(r[2] || '').trim()) + '</td>' +
                    '<td class="td-num ct-data">' + fv(r[3]) + '</td>' +
                    '<td class="td-num ct-dieukien">' + fv(r[4]) + '</td>';

                /* Tier columns 5-9 */
                for (var tc = 5; tc <= 9; tc++) {
                    var tierVal = fv(r[tc]);
                    var cls = 'td-num ct-percent';
                    if (tc === achievedTier) cls += ' cell-dat';
                    bHtml += '<td class="' + cls + '">' + tierVal + '</td>';
                }

                bHtml +=
                    '<td class="td-num ct-percent cell-percent">' + fv(r[10]) + '</td>' +
                    '<td class="td-num ct-data">' + fv(r[11]) + '</td>' +
                    rewardCell(r[12]) +
                    '</tr>';
            });

            var html = '<div class="po-ptw policy-nsqn-wrap"><table class="po-pt">' +
                '<thead>' + r1 + r2 + '</thead>' +
                '<tbody>' + bHtml + '</tbody>' +
                '</table></div>';
            ct.innerHTML = html;

            /* Row click highlight */
            ct.querySelectorAll('.policy-nsqn-wrap tbody tr').forEach(function(row) {
                row.addEventListener('click', function() {
                    ct.querySelectorAll('tbody tr.is-focus').forEach(function(activeRow) {
                        activeRow.classList.remove('is-focus');
                    });
                    row.classList.add('is-focus');
                });
            });

            /* Fix sticky 2nd row offset */
            function fixSticky() {
                var thead = ct.querySelector('.policy-nsqn-wrap thead');
                if (thead && thead.rows.length >= 2) {
                    var h1 = thead.rows[0].getBoundingClientRect().height;
                    if (h1 > 0) {
                        var cells2 = thead.rows[1].cells;
                        for (var c = 0; c < cells2.length; c++) {
                            cells2[c].style.top = h1 + 'px';
                        }
                    }
                }
            }
            requestAnimationFrame(function() { requestAnimationFrame(fixSticky); });
            setTimeout(fixSticky, 300);
        }

        /* ===== PTKD RENDERER ===== */
        function TD_renderPolicyPTKD(ct, csv, rows, sectionName) {
            var all = TD_csv(csv);
            if (!all.length || all.length < 2) {
                ct.innerHTML = '<div style="text-align:center;padding:40px;color:var(--td-fgm)">Tab trống</div>';
                return;
            }
            var body = all.slice(1, 1 + rows);

            function fv(v) {
                var s = String(v == null ? '' : v).trim();
                if (!s) return '';
                var compact = s.replace(/\s/g, '');
                if (!/^-?\d+(?:[.,]\d+)?$/.test(compact)) return s;
                var n = Number(compact.replace(/\./g, '').replace(',', '.'));
                if (!isFinite(n)) return s;
                return n.toLocaleString('vi-VN');
            }

            function rewardCell(v) {
                var val = fv(v);
                if (!val) return '<td class="col-thuong-cell"></td>';
                return '<td class="col-thuong-cell"><span class="thuong-val"><i class="fa-solid fa-trophy"></i> ' + esc(val) + '</span></td>';
            }

            /* Simple flat table: STT, NHÓM KD, MÃ SỐ ĐẠI LÝ, HỌ TÊN TVV, CHỨC VỤ, FYP NHÓM, LƯỢT HĐC NHÓM, FYC, TỶ LỆ THƯỞNG, TIỀN THƯỞNG */
            var headerHtml = '<tr>' +
                '<th>STT</th>' +
                '<th>NHÓM KD</th>' +
                '<th>MÃ SỐ<br>ĐẠI LÝ</th>' +
                '<th>HỌ TÊN TVV</th>' +
                '<th>CHỨC VỤ</th>' +
                '<th>FYP<br>NHÓM</th>' +
                '<th>LƯỢT HĐC<br>NHÓM</th>' +
                '<th>FYC<br>(TLHH 25%)</th>' +
                '<th class="col-percent">TỶ LỆ<br>THƯỞNG</th>' +
                '<th class="col-thuong">TIỀN<br>THƯỞNG</th>' +
                '</tr>';

            var bHtml = '';
            body.forEach(function(r, idx) {
                /* Columns: 0=NHÓM KD, 1=MS ĐẠI LÝ, 2=HỌ TÊN TVV, 3=CHỨC VỤ, 4=FYP nhóm, 5=LƯỢT HĐC nhóm, 6=FYC, 7=TỶ LỆ THƯỞNG, 8=TIỀN THƯỞNG */
                bHtml += '<tr>' +
                    '<td class="pst">' + (idx + 1) + '</td>' +
                    '<td class="td-text col-name">' + esc(String(r[0] || '').trim()) + '</td>' +
                    '<td class="td-text col-code">' + esc(String(r[1] || '').trim()) + '</td>' +
                    '<td class="td-text col-name">' + esc(String(r[2] || '').trim()) + '</td>' +
                    '<td class="td-text col-code">' + esc(String(r[3] || '').trim()) + '</td>' +
                    '<td class="td-num ct-data">' + fv(r[4]) + '</td>' +
                    '<td class="td-num ct-data">' + fv(r[5]) + '</td>' +
                    '<td class="td-num ct-data">' + fv(r[6]) + '</td>' +
                    '<td class="td-num ct-percent cell-percent">' + fv(r[7]) + '</td>' +
                    rewardCell(r[8]) +
                    '</tr>';
            });

            var html = '<div class="po-ptw policy-ptkd-wrap"><table class="po-pt">' +
                '<thead>' + headerHtml + '</thead>' +
                '<tbody>' + bHtml + '</tbody>' +
                '</table></div>';
            ct.innerHTML = html;

            /* Row click highlight */
            ct.querySelectorAll('.policy-ptkd-wrap tbody tr').forEach(function(row) {
                row.addEventListener('click', function() {
                    ct.querySelectorAll('tbody tr.is-focus').forEach(function(activeRow) {
                        activeRow.classList.remove('is-focus');
                    });
                    row.classList.add('is-focus');
                });
            });
        }

        function TD_ws(data) {
            return fetch(TD_SCR, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(function(r) { return r.json(); }).then(function(r) {
                if (!r.ok) throw new Error(r.error || 'Lỗi ghi');
                return true;
            }).catch(function() { return false; });
        }

        function createTDPage(cfg) {
            var P = cfg.prefix, pv = cfg.varName;
            var s = { programs: [], adm: false, er: null, dr: null, pd: null, ddOpen: false, inited: false };

            function gid(id) { return document.getElementById(id); }
            
            function ha() {
                ['LoadW', 'ErrW', 'EmptyW', 'Grid'].forEach(function(k) { gid(P + k).style.display = 'none'; });
                gid(P + 'SyncOk').style.display = 'none';
                gid(P + 'SyncErr').style.display = 'none';
            }

            function ca() {
                try { s.adm = sessionStorage.getItem('td_a') === '1'; } catch (e) { s.adm = false; }
                uu();
            }

            function sa(v) {
                s.adm = v;
                try { sessionStorage.setItem('td_a', v ? '1' : '0'); } catch (e) { }
                uu();
            }

            function uu() {
                var a = gid(P + 'AdmBtn');
                if (a) a.classList.toggle('on', s.adm);
                ['DdAdd', 'DdOut', 'DdLock'].forEach(function(id) {
                    var el = gid(P + id);
                    if (el) el.style.display = s.adm ? 'flex': 'none';
                });
                var sp = gid(P + 'DdSep');
                if (sp) sp.style.display = s.adm ? 'block': 'none';
                
                var pe = gid(P + 'PopEdt');
                if (pe) pe.style.display = s.adm ? 'flex': 'none';
                
                gid(P + 'Container').querySelectorAll('.pcard-acts').forEach(function(el) {
                    el.style.display = s.adm ? 'flex': 'none';
                });
            }

            function na(cb) { s.adm ? cb() : apw(cb); }
            function togDD() {
                if (!s.adm) { na(function() { s.ddOpen = true; gid(P + 'AdmDD').classList.add('show'); }); return; }
                s.ddOpen = !s.ddOpen;
                gid(P + 'AdmDD').classList.toggle('show', s.ddOpen);
            }
            function admAdd() { s.ddOpen = false; gid(P + 'AdmDD').classList.remove('show'); na(oa); }
function admOut() { s.ddOpen = false; gid(P + 'AdmDD').classList.remove('show'); sa(false); toast('Đã đăng xuất', 'ok'); }
function admLock() { s.ddOpen = false; gid(P + 'AdmDD').classList.remove('show'); sa(false); toast('Đã khóa', 'ok'); }
            function admReload() { s.ddOpen = false; gid(P + 'AdmDD').classList.remove('show'); lfs(); }

            function apw(cb) {
                s._pcb = cb;
                gid(P + 'PwInp').value = '';
                gid(P + 'PwErr').textContent = '';
                gid(P + 'PwInp').classList.remove('err');
                gid(P + 'PwMdl').classList.add('open');
                document.body.style.overflow = 'hidden';
                setTimeout(function() { gid(P + 'PwInp').focus(); }, 300);
            }
            function cpw() { gid(P + 'PwMdl').classList.remove('open'); document.body.style.overflow = ''; s._pcb = null; }
            function spw() {
                if (gid(P + 'PwInp').value === TD_PW) {
                    sa(true); cpw(); toast('Đăng nhập thành công', 'ok');
                    if (typeof s._pcb === 'function') s._pcb();
                    s._pcb = null;
                } else {
                    gid(P + 'PwInp').classList.add('err');
                    gid(P + 'PwErr').textContent = 'Sai mật khẩu';
                    gid(P + 'PwInp').value = '';
                    setTimeout(function() { gid(P + 'PwInp').focus(); }, 100);
                }
            }

            async function lfs() {
                ha();
                gid(P + 'LoadW').style.display = 'block';
                try {
                    var csv = await TD_fetchText([TD_gdc(), TD_gdcAlt()]);
                    if (!csv || !csv.trim()) throw new Error('Tab trống.');
                    var rows = TD_csv(csv);
                    if (rows.length < 2) throw new Error('Chỉ có tiêu đề.');
                    
                    s.programs = [];
                    for (var i = 1; i < rows.length; i++) {
                        var r = rows[i];
                        if (!r[0] || !r[0].trim()) continue;
                        s.programs.push({
                            row: i + 1,
                            name: (r[0] || '').trim(),
                            posterUrl: (r[1] || '').trim(),
                            sheetName: (r[2] || '').trim(),
                            dateStart: TD_fdi((r[3] || '').trim()),
                            dateEnd: TD_fdi((r[4] || '').trim()),
                            datePH: TD_fdi((r[5] || '').trim()),
                            cols: parseInt(r[6]) || 0,
                            rows: parseInt(r[7]) || 0
                        });
                    }
                    gid(P + 'SyncOk').style.display = 'inline-flex';
                    gid(P + 'SyncErr').style.display = 'none';
                    rc();
                    uu();
                } catch (e) {
                    gid(P + 'ErrMsg').textContent = e.message || 'Lỗi';
                    gid(P + 'ErrW').style.display = 'block';
                    gid(P + 'SyncErr').style.display = 'inline-flex';
                }
                gid(P + 'LoadW').style.display = 'none';
            }

            function rc() {
                var g = gid(P + 'Grid'), ew = gid(P + 'EmptyW');
                var filtered = s.programs.filter(function(p) { return cfg.filterFn(p.name); });
                if (!filtered.length) {
                    ew.style.display = 'block';
                    g.style.display = 'none';
                    gid(P + 'CntB').style.display = 'none';
                    return;
                }
                ew.style.display = 'none';
                g.style.display = 'grid';
                gid(P + 'CntB').style.display = 'inline-flex';
                gid(P + 'CntN').textContent = filtered.length;
                
                var h = '';
                for (var i = 0; i < filtered.length; i++) {
                    var p = filtered[i], hasImg = !!p.posterUrl, dl = i * .06, pidx = s.programs.indexOf(p);
                    h += '<div class="pcard" style="animation-delay:' + dl + 's" onclick="' + pv + '.op(' + pidx + ')">' +
                        '<div class="pcard-acts" style="display:' + (s.adm ? 'flex' : 'none') + '">' +
                        '<button class="ca-btn edt" onclick="event.stopPropagation();' + pv + '.na(function(){' + pv + '.oe(' + pidx + ')})" aria-label="Sửa"><i class="fa-solid fa-pen"></i></button>' +
                        '<button class="ca-btn del" onclick="event.stopPropagation();' + pv + '.na(function(){' + pv + '.ad(' + pidx + ')})" aria-label="Xóa"><i class="fa-solid fa-trash"></i></button>' +
                        '</div>' +
                        '<div class="pcard-img">' +
                        (hasImg ? '<img src="' + esc(p.posterUrl) + '" alt="' + esc(p.name) + '" loading="lazy" onerror="this.onerror=null;this.style.display=\'none\'">' : '') +
                        (!hasImg ? '<div class="pcard-noimg"><i class="fa-regular fa-image"></i></div>' : '') +
                        '<div class="pcard-grad"></div>' +
                        '<div class="pcard-body">' +
                        '<div class="pcard-name">' + esc(p.name) + '</div>' +
                        '<div class="pcard-dates">' +
                        '<span class="pcard-d"><i class="fa-solid fa-calendar-days"></i>' + TD_fd(p.dateStart) + '–' + TD_fd(p.dateEnd) + '</span>' +
                        (p.datePH ? '<span class="pcard-d"><i class="fa-solid fa-flag-checkered"></i>PH: ' + TD_fd(p.datePH) + '</span>' : '') +
                        '</div>' +
                        '</div>' +
                        '</div>' +
                        '</div>';
                }
                g.innerHTML = h;
            }

            function oa() {
                s.er = null;
                gid(P + 'MTtl').textContent = 'Thêm chương trình';
                gid(P + 'MSub').textContent = 'Ghi lên Google Sheet';
                ['MName', 'MUrl', 'MTab', 'MCols', 'MRows', 'MDS', 'MDE', 'MDPH'].forEach(function(id) { gid(P + id).value = ''; });
                gid(P + 'Mdl').classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function oe(idx) {
                var p = s.programs[idx];
                if (!p) return;
                s.er = p.row;
                gid(P + 'MTtl').textContent = 'Sửa chương trình';
                gid(P + 'MSub').textContent = 'Cập nhật hàng ' + p.row;
                gid(P + 'MName').value = p.name || '';
                gid(P + 'MUrl').value = p.posterUrl || '';
                gid(P + 'MTab').value = p.sheetName || '';
                gid(P + 'MCols').value = p.cols || '';
                gid(P + 'MRows').value = p.rows || '';
                gid(P + 'MDS').value = p.dateStart || '';
                gid(P + 'MDE').value = p.dateEnd || '';
                gid(P + 'MDPH').value = p.datePH || '';
                gid(P + 'Mdl').classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function cm() { gid(P + 'Mdl').classList.remove('open'); document.body.style.overflow = ''; s.er = null; }

            async function autoDet() {
                var tab = gid(P + 'MTab').value.trim();
                if (!tab) { toast('Nhập tên sheet trước', 'err'); return; }
                var btn = gid(P + 'AutoBtn');
                btn.classList.add('ld');
                btn.innerHTML = '<i class="fa-solid fa-spinner mr-1"></i>Nhận diện...';
                try {
                    var csv = await TD_fetchText([TD_gtc(tab), TD_gtcAlt(tab)]);
                    var rows = TD_csv(csv);
                    if (!rows.length) throw new Error('Tab trống');
                    gid(P + 'MCols').value = rows[0].length;
                    gid(P + 'MRows').value = Math.max(rows.length - 1, 1);
                    toast(rows[0].length + ' cột, ' + (rows.length - 1) + ' hàng', 'ok');
                } catch (e) { toast(e.message || 'Lỗi', 'err'); }
                finally {
                    btn.classList.remove('ld');
                    btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-1"></i>Tự động';
                }
            }

            async function savePrg() {
                var name = gid(P + 'MName').value.trim(),
                    posterUrl = gid(P + 'MUrl').value.trim(),
                    sheetName = gid(P + 'MTab').value.trim(),
                    cols = parseInt(gid(P + 'MCols').value) || 0,
                    rows = parseInt(gid(P + 'MRows').value) || 0,
                    dateS = gid(P + 'MDS').value,
                    dateE = gid(P + 'MDE').value,
                    datePH = gid(P + 'MDPH').value;

                if (!name) { toast('Nhập tên chương trình', 'err'); return; }
                if (!sheetName) { toast('Nhập tên sheet dữ liệu', 'err'); return; }
                if (!dateS || !dateE || !datePH) { toast('Chọn đủ 3 ngày', 'err'); return; }
                if (cols < 1 || cols > 20) { toast('Số cột 1-20', 'err'); return; }
                if (rows < 1 || rows > 500) { toast('Số hàng 1-500', 'err'); return; }

                var data = {
                    ten: name,
                    poster: posterUrl,
                    tab: sheetName,
                    batdau: TD_fdo(dateS),
                    ketthuc: TD_fdo(dateE),
                    chotph: TD_fdo(datePH),
                    cot: cols,
                    hang: rows
                };

                if (s.er) data.action = 'edit', data.row = s.er;
                else data.action = 'add';

                var ok = await TD_ws(data);
                if (ok) {
toast(s.er ? 'Đã cập nhật' : 'Đã thêm', 'ok');
                    cm();
                    await lfs();
                }
            }

            function ad(idx) {
                s.dr = s.programs[idx].row;
                gid(P + 'CfmTxt').textContent = '"' + s.programs[idx].name + '" sẽ bị xóa khỏi Sheet.';
                gid(P + 'CfmDel').classList.add('open');
            }

            function ccf() { gid(P + 'CfmDel').classList.remove('open'); s.dr = null; }
            async function ddl() {
                if (!s.dr) return;
                var ok = await TD_ws({ action: 'delete', row: s.dr });
if (ok) { toast('Đã xóa', 'ok'); ccf(); await lfs(); }
            }

            async function op(idx) {
                var p = s.programs[idx];
                if (!p) return;
                s.pd = p;
                var pw = gid(P + 'PopPoster'), hasImg = !!p.posterUrl;
                pw.innerHTML = '';
                if (hasImg) {
                    var img = document.createElement('img');
                    img.className = 'pop-poster';
                    img.alt = p.name;
                    img.src = p.posterUrl;
                    img.onerror = function() { this.outerHTML = '<div class="pop-ph"><i class="fa-regular fa-image text-3xl" style="opacity:.3"></i></div>'; };
                    pw.appendChild(img);
                } else {
                    pw.innerHTML += '<div class="pop-ph"><i class="fa-regular fa-image text-3xl" style="opacity:.3"></i></div>';
                }
                gid(P + 'PopName').textContent = p.name;
                gid(P + 'PopName').className = 'fd text-xl font-bold' + (cfg.prefix === 'po' ? ' po-title' : '');
                gid(P + 'PopTag').style.display = 'none';
                var dateInfo = '';
                if (p.dateStart || p.dateEnd) dateInfo += '<i class="fa-solid fa-calendar-days"></i> ' + TD_fd(p.dateStart) + ' – ' + TD_fd(p.dateEnd);
                if (p.datePH) dateInfo += (dateInfo ? '    ' : '') + '<i class="fa-solid fa-flag-checkered"></i> PH: ' + TD_fd(p.datePH);
                if (dateInfo) {
                    gid(P + 'PopSub').style.display = 'inline-flex';
                    gid(P + 'PopSub').innerHTML = dateInfo;
                } else {
                    gid(P + 'PopSub').style.display = 'none';
                }
                
                var ct = gid(P + 'PopCt');
                // Skeleton Loading for table
                var sc = Math.min(p.cols, 8), sr = Math.min(p.rows, 5);
                var sh = '', sb = '';
                for(var c=0; c<sc; c++) sh += '<th><div class="sk" style="width:'+(55+Math.random()*55)+'px"></div></th>';
                for(var r=0; r<sr; r++) {
                    sb += '<tr>';
                    for(var c2=0; c2<sc; c2++) sb += '<td><div class="sk" style="width:'+(45+Math.random()*60)+'px"></div></td>';
                    sb += '</tr>';
                }
                var isPolicySk = cfg.prefix === 'po';
                var skWrapCls = isPolicySk ? 'po-ptw' : 'ptw';
                var skTblCls = isPolicySk ? 'po-pt' : 'pt';
                var skTableHtml = '<div class="' + skWrapCls + '"><table class="' + skTblCls + '"><thead><tr>'+sh+'</thead><tbody>'+sb+'</tbody></table></div>';
                ct.innerHTML = skTableHtml;

                gid(P + 'Popup').classList.add('open');
                document.body.style.overflow = 'hidden';

                // Load real data
                try {
                    if (cfg.prefix === 'po' && p.sheetName === 'TL') {
                        var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                        TD_renderPolicyTL(ct, csv, p.rows, p.name);
                    } else if (cfg.prefix === 'po' && (p.sheetName === 'TN' || p.sheetName === 'TN2' || p.sheetName === 'TN3')) {
                        var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                        TD_renderPolicyTN(ct, csv, p.rows, p.name);
                    } else if (cfg.prefix === 'po' && p.sheetName === 'TVVM') {
                        var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                        TD_renderPolicyTVVM(ct, csv, p.rows, p.name);
                    } else if (cfg.prefix === 'po' && p.sheetName === 'NST') {
                        var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                        TD_renderPolicyNST(ct, csv, p.rows, p.name);
                    } else if (cfg.prefix === 'po' && p.sheetName === 'NSQ') {
                        var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                        TD_renderPolicyNSQ(ct, csv, p.rows, p.name);
                    } else if (cfg.prefix === 'po' && p.sheetName === 'NSQ-N') {
                        var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                        TD_renderPolicyNSQN(ct, csv, p.rows, p.name);
                    } else if (cfg.prefix === 'po' && p.sheetName === 'PTKD') {
                        var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                        TD_renderPolicyPTKD(ct, csv, p.rows, p.name);
                    } else if (cfg.useSheetLayout) {
                        try {
                            var layout = await TD_fetchSheetLayout(p.sheetName, p.cols, p.rows);
                            TD_renderSheetLayout(ct, layout);
                        } catch (layoutErr) {
                            var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                            rpt(ct, csv, p.cols, p.rows);
                        }
                    } else if (cfg.prefix === 'cb') {
                        /* CLB pages: custom grouped headers with rank colors */
                        var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                        TD_renderCLB(ct, csv, p.cols, p.rows, p.sheetName);
                    } else {
                        var csv = await TD_fetchText([TD_gtc(p.sheetName), TD_gtcAlt(p.sheetName)]);
                        rpt(ct, csv, p.cols, p.rows);
                    }
                } catch (err) {
                    ct.innerHTML = '<div style="text-align:center;padding:50px 20px;color:var(--td-fgm)"><i class="fa-solid fa-circle-exclamation block text-3xl mb-3" style="color:var(--td-red)"></i><p class="text-base font-semibold mb-1">Lỗi tải dữ liệu</p><p class="text-sm mb-4">' + esc(err.message || '') + '</p><button onclick="' + pv + '.rpop()" class="bp text-sm"><i class="fa-solid fa-rotate mr-1"></i>Thử lại</button></div>';
                }
            }

            function rpop() { if (!s.pd) return; var idx = s.programs.indexOf(s.pd); if (idx >= 0) op(idx); }
            function cpop() { gid(P + 'Popup').classList.remove('open'); document.body.style.overflow = ''; s.pd = null; }
            function efp() { if (!s.pd) return; var idx = s.programs.indexOf(s.pd); cpop(); na(function() { setTimeout(function() { oe(idx); }, 350); }); }

            function rpt(ct, csv, cols, rows) {
                var all = TD_csv(csv);
                if (!all.length) { ct.innerHTML = '<div style="text-align:center;padding:40px;color:var(--td-fgm)">Tab trống</div>'; return; }

                function headerKey(v) {
                    return String(v || '').trim().toLowerCase()
                        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                        .replace(/[đĐ]/g, 'd').replace(/[^a-z0-9]+/g, ' ')
                        .replace(/\s+/g, ' ').trim();
                }

                function columnClass(header, colIndex, headers) {
                    var key = headerKey(header);
                    if (/(stt|xep hang)/.test(key)) return 'col-stt num-col';
                    if (/(ho ten|ten ho|ten nhom|nhom tvv|ten tn|ten tvv|ten ns|ten cad|ten tv$|ten tvv$|^ten$|ten$)/.test(key)) return 'col-name';
                    if (/(ma so|ma tn|m a|ma s|ma tvv|^ma$|^ms$|ma kd|ma dai ly|hl chuc vu|msdl|ms dl|ms dai ly)/.test(key)) return 'col-code';
                    if (/(nhom kd|nhom|don vi|doi tvv)/.test(key)) return 'col-name';
                    if (/(chuc vu|cv$)/.test(key)) return 'col-code num-col';
                    /* === TỔNG FYP/FYC NHÓM (trước tong chung) === */
                    if (/(tong fyp nhom|tong fyc nhom)/.test(key)) return 'num-col col-fypnhom';
                    /* === FYC riêng (bỏ tô màu) === */
                    if (/fyc/.test(key) && !/fyp/.test(key)) return 'num-col col-fyc';
                    if (/(sl|so luong|tvv|count|tong|luot hd|so luong hd|thang lam viec|quy mo)/.test(key)) return 'col-count num-col';
                    /* === THƯỞNG === */
                    if (/(thuong|thu nhap|du kien|afyp|doanh so|tien|phat trien kinh doanh)/.test(key)) return 'num-col col-thuong';
                    /* === ĐIỀU KIỆN / CHỈ TIÊU === */
                    if (/(dieu kien|dat|chi tieu)/.test(key)) {
                        /* Xác định mức chỉ tiêu (tăng dần) nếu có nhiều mức cùng bản chất */
                        var nature = 'dieukien';
                        var level = 0;
                        if (headers) {
                            for (var h = 0; h < colIndex; h++) {
                                var hk = headerKey(headers[h]);
                                if (/(dieu kien|dat|chi tieu)/.test(hk)) level++;
                            }
                        }
                        var levelClass = level > 0 ? ' ct-lv' + Math.min(level, 5) : '';
                        return 'num-col col-dieukien' + levelClass;
                    }
                    /* === TỶ LỆ === */
                    if (/(tlht|ty le)/.test(key)) return 'num-col col-percent';
                    /* === THỰC HIỆN / LŨY KÊ === */
                    if (/(luy ke)/.test(key)) return 'num-col col-luyke';
                    if (/(ip|thang|quy|nam|ngay|fyp|fyc|hd|ve)/.test(key)) return 'num-col';
                    return '';
                }

                /* Determine column nature group for body tinting */
                function colNatureGroup(header) {
                    var key = headerKey(header);
                    if (/(stt|xep hang)/.test(key)) return 'info';
                    if (/(ho ten|ten ho|ten nhom|nhom tvv|ten tn|ten tvv|ten ns|ten cad|ten tv$|ten tvv$|^ten$|ten$)/.test(key)) return 'info';
                    if (/(ma so|ma tn|m a|ma s|ma tvv|^ma$|^ms$|ma kd|ma dai ly|hl chuc vu|msdl|ms dl|ms dai ly)/.test(key)) return 'info';
                    if (/(nhom kd|nhom|don vi|doi tvv)/.test(key)) return 'info';
                    if (/(chuc vu|cv$)/.test(key)) return 'info';
                    /* === TỔNG FYP/FYC NHÓM === */
                    if (/(tong fyp nhom|tong fyc nhom)/.test(key)) return 'fypnhom';
                    /* === FYC riêng (bỏ tô màu) === */
                    if (/fyc/.test(key) && !/fyp/.test(key)) return 'fyc';
                    if (/(thuong|thu nhap|du kien|afyp|doanh so|tien|phat trien kinh doanh)/.test(key)) return 'thuong';
                    if (/(dieu kien|dat|chi tieu)/.test(key)) return 'dieukien';
                    if (/(tlht|ty le)/.test(key)) return 'percent';
                    if (/(luy ke)/.test(key)) return 'luyke';
                    if (/(sl|so luong|tvv|count|tong|luot hd|so luong hd|thang lam viec|quy mo)/.test(key)) return 'count';
                    if (/(ip|thang|quy|nam|ngay|fyp|fyc|hd|ve)/.test(key)) return 'data';
                    return 'data';
                }

                /* Count levels of same nature before this column (for gradient) */
                function natureLevelBefore(headers, colIndex, nature) {
                    var count = 0;
                    for (var h = 0; h < colIndex; h++) {
                        if (colNatureGroup(headers[h]) === nature) count++;
                    }
                    return count;
                }

                function formatCell(val, header) {
                    var raw = String(val == null ? '' : val).trim();
                    if (!raw || raw === '10000001111') return raw;
                    var key = headerKey(header);
                    var compact = raw.replace(/\s/g, '');
                    if (!/^-?\d+(?:[.,]\d+)?$/.test(compact)) return raw;
                    var n = Number(compact.replace(/\./g, '').replace(',', '.'));
                    if (!isFinite(n)) return raw;
                    if (/(thuong|thu nhap|du kien|afyp|doanh so|tien|tong fyp|tong fyc)/.test(key)) return n.toLocaleString('vi-VN');
                    if (/(sl|so luong|tvv|nhom|count|tong|quy mo)/.test(key)) return n.toLocaleString('vi-VN');
                    return raw;
                }

                function cellClass(header, rawVal, displayVal, colIndex, headers, isPolicy) {
                    var key = headerKey(header);
                    var isInfoCol = /(stt|xep hang|ho ten|ten ho|ten nhom|nhom tvv|ten tn|ten tvv|ten ns|ten cad|ten tv$|ten tvv$|^ten$|ten$|ma so|ma tn|m a|ma s|ma tvv|^ma$|^ms$|ma kd|ma dai ly|hl chuc vu|msdl|ms dl|ms dai ly|nhom kd|nhom|don vi|doi tvv|chuc vu|cv$)/.test(key);
                    /* 4 cột đầu (STT, Nhóm, Mã số, Họ tên) → trắng, không tô màu */
                    if (isInfoCol) {
                        if (/(stt|xep hang)/.test(key)) return 'td-num col-stt';
                        if (/(ho ten|ten ho|ten nhom|nhom tvv|ten tn|ten tvv|ten ns|ten cad|ten tv$|ten tvv$|^ten$|ten$|nhom kd|nhom|don vi|doi tvv)/.test(key)) return 'td-text col-name';
                        if (/(ma so|ma tn|m a|ma s|ma tvv|^ma$|^ms$|ma kd|ma dai ly|hl chuc vu|msdl|ms dl|ms dai ly|chuc vu|cv$)/.test(key)) return 'td-text col-code';
                    }
                    /* === TỔNG FYP/FYC NHÓM → hồng nhạt, trái, đậm === */
                    if (/(tong fyp nhom|tong fyc nhom)/.test(key)) return 'td-text col-fypnhom-cell';
                    /* === FYC riêng → bỏ tô màu === */
                    if (/fyc/.test(key) && !/fyp/.test(key)) {
                        var isNumFyc = /^-?\d+(?:[.,]\d+)?$/.test(String(displayVal).replace(/\s/g, ''));
                        return isNumFyc ? 'td-num col-fyc-cell' : 'td-text col-fyc-cell';
                    }
                    /* === ĐẠT / CHƯA ĐẠT === */
                    if (rawVal === '10000001111') return 'td-num ach-cell';
                    if (/(dieu kien|dat|chua dat|chi tieu)/.test(key)) {
                        var raw2 = String(rawVal).trim().toLowerCase();
                        if (/dat/.test(raw2) && /chua/.test(raw2) === false) return 'td-num cell-dat';
                        if (/chua dat/.test(raw2)) return 'td-num cell-chuadat';
                    }
                    /* === TỶ LỆ % → bold, đỏ === */
                    if (/(tlht|ty le)/.test(key)) return 'td-num cell-percent';
                    /* === THƯỞNG → bold, xanh dương + icon sẽ inject ở body loop === */
                    if (/(thuong|thu nhap|du kien|afyp|doanh so|tien|phat trien kinh doanh)/.test(key)) return 'td-money col-thuong-cell';
                    /* === Số liệu → tô màu nhạt theo bản chất nhóm === */
                    var nature = colNatureGroup(header);
                    var level = natureLevelBefore(headers || [], colIndex || 0, nature);
                    var tintClass = ' ct-' + nature + (level > 0 ? '-lv' + Math.min(level, 5) : '');
                    /* Xác định số vs text */
                    var isNum = /^-?\d+(?:[.,]\d+)?$/.test(String(displayVal).replace(/\s/g, ''));
                    if (isNum) return 'td-num' + tintClass;
                    return 'td-text' + tintClass;
                }

                function trimCell(v) {
                    return String(v == null ? '' : v).trim();
                }

                function splitWords(v) {
                    return trimCell(v).split(/\s+/).filter(Boolean);
                }

                function dedupeRepeatedHeader(v) {
                    var text = trimCell(v);
                    if (!text) return '';
                    var words = splitWords(text);
                    if (words.length >= 2 && words.length % 2 === 0) {
                        var half = words.length / 2;
                        var left = words.slice(0, half).join(' ');
                        var right = words.slice(half).join(' ');
                        if (left === right) return left;
                    }
                    return text;
                }

                function commonPrefixWords(a, b) {
                    var aw = splitWords(a), bw = splitWords(b);
                    var shared = [];
                    for (var i = 0; i < Math.min(aw.length, bw.length); i++) {
                        if (aw[i] !== bw[i]) break;
                        shared.push(aw[i]);
                    }
                    return shared.length >= 2 ? shared.join(' ') : '';
                }

                function hasAdjacentDuplicate(row, limit) {
                    for (var i = 0; i < limit - 1; i++) {
                        var cur = trimCell(row[i]), next = trimCell(row[i + 1]);
                        if (cur && cur === next) return true;
                    }
                    return false;
                }

                function buildMergedHeader(rows2, dc) {
                    var top = rows2[0] || [];
                    var bottom = rows2[1] || [];
                    var row1 = '<tr><th rowspan="2">STT</th>';
                    var row2 = '<tr>';
                    var skipBottom = new Array(dc).fill(false);

                    for (var c1 = 0; c1 < dc; ) {
                        var topVal = trimCell(top[c1]);
                        var bottomVal = trimCell(bottom[c1]);
                        var classSeed = topVal || bottomVal || ('Cột ' + (c1 + 1));

                        if (topVal && topVal === bottomVal) {
                            row1 += '<th rowspan="2" class="' + columnClass(classSeed, c1, hd) + '">' + esc(topVal) + '</th>';
                            skipBottom[c1] = true;
                            c1++;
                            continue;
                        }
                        var spanTop = 1;
                        while (c1 + spanTop < dc) {
                            var nextTop = trimCell(top[c1 + spanTop]);
                            var nextBottom = trimCell(bottom[c1 + spanTop]);
                            if (nextTop !== topVal) break;
                            if (nextTop && nextTop === nextBottom) break;
                            spanTop++;
                        }

                        row1 += '<th' + (spanTop > 1 ? ' colspan="' + spanTop + '"' : '') + ' class="' + columnClass(classSeed, c1, hd) + '">' + esc(topVal || bottomVal || ('Cột ' + (c1 + 1))) + '</th>';
                        c1 += spanTop;
                    }

                    for (var c2 = 0; c2 < dc; ) {
                        if (skipBottom[c2]) {
                            c2++;
                            continue;
                        }

                        var bottomText = trimCell(bottom[c2]);
                        var topText = trimCell(top[c2]);
                        var seed = bottomText || topText || ('Cột ' + (c2 + 1));
                        var spanBottom = 1;

                        while (c2 + spanBottom < dc) {
                            if (skipBottom[c2 + spanBottom]) break;
                            var nextBottomText = trimCell(bottom[c2 + spanBottom]);
                            if (nextBottomText !== bottomText) break;
                            spanBottom++;
                        }

                        row2 += '<th' + (spanBottom > 1 ? ' colspan="' + spanBottom + '"' : '') + ' class="' + columnClass(seed, c2, hd) + '">' + esc(bottomText || topText || ('Cột ' + (c2 + 1))) + '</th>';
                        c2 += spanBottom;
                    }

                    row1 += '</tr>';
                    row2 += '</tr>';
                    return row1 + row2;
                }

                function canBuildCompositeHeader(row, dc) {
                    var normalized = [];
                    for (var i = 0; i < dc; i++) normalized.push(dedupeRepeatedHeader(row[i]));
                    for (var j = 0; j < dc - 1; j++) {
                        if (commonPrefixWords(normalized[j], normalized[j + 1])) return true;
                    }
                    return normalized.some(function(v, idx) { return v && v !== trimCell(row[idx]); });
                }

                function buildCompositeHeader(row, dc) {
                    var normalized = [];
                    for (var i = 0; i < dc; i++) normalized.push(dedupeRepeatedHeader(row[i]));
                    var row1 = '<tr><th rowspan="2">STT</th>';
                    var row2 = '<tr>';

                    for (var c = 0; c < dc; ) {
                        var cell = normalized[c] || ('Cột ' + (c + 1));
                        var prefix = c < dc - 1 ? commonPrefixWords(cell, normalized[c + 1]) : '';

                        if (!prefix) {
                            row1 += '<th rowspan="2" class="' + columnClass(cell, c, hd) + '">' + esc(cell) + '</th>';
                            c++;
                            continue;
                        }

                        var span = 1;
                        while (c + span < dc) {
                            var candidate = normalized[c + span];
                            if (!candidate || !candidate.startsWith(prefix + ' ')) break;
                            span++;
                        }

                        row1 += '<th colspan="' + span + '">' + esc(prefix) + '</th>';
                        for (var k = 0; k < span; k++) {
                            var full = normalized[c + k] || ('Cột ' + (c + k + 1));
                            var sub = full.indexOf(prefix + ' ') === 0 ? full.slice(prefix.length).trim() : full;
                            row2 += '<th class="' + columnClass(full, c + k, hd) + '">' + esc(sub || full) + '</th>';
                        }
                        c += span;
                    }

                    row1 += '</tr>';
                    row2 += '</tr>';
                    return row1 + row2;
                }

                var hd = all[0] || [];
                var maybeSecondHeader = all[1] || [];
                /* Trim trailing empty columns: drop columns whose header (both rows) is empty
                   AND every data row is empty in that column. */
                var dc = Math.max(hd.length, maybeSecondHeader.length);
                while (dc > 0) {
                    var topEmpty = !String(hd[dc - 1] == null ? '' : hd[dc - 1]).trim();
                    var botEmpty = !String(maybeSecondHeader[dc - 1] == null ? '' : maybeSecondHeader[dc - 1]).trim();
                    if (!topEmpty || !botEmpty) break;
                    var anyDataInCol = false;
                    for (var rr = 2; rr < all.length; rr++) {
                        var cv = all[rr] && all[rr][dc - 1];
                        if (cv != null && String(cv).trim() !== '') { anyDataInCol = true; break; }
                    }
                    if (anyDataInCol) break;
                    dc--;
                }
                var groupCol = -1;
                for (var gi = 0; gi < dc; gi++) {
                    var gk = headerKey(hd[gi]);
                    if (/(^|\s)nhom(\s|$)|nhom kd/.test(gk)) { groupCol = gi; break; }
                }
                var useDualHeader = all.length > 1 && maybeSecondHeader.slice(0, dc).some(function(v) { return trimCell(v); }) && (
                    hasAdjacentDuplicate(hd, dc) ||
                    hasAdjacentDuplicate(maybeSecondHeader, dc) ||
                    hd.slice(0, dc).some(function(v, idx) {
                        var topVal = trimCell(v);
                        return topVal && topVal === trimCell(maybeSecondHeader[idx]);
                    })
                );
                var useCompositeHeader = !useDualHeader && canBuildCompositeHeader(hd, dc);
                var dataStart = useDualHeader ? 2 : 1;
                var data = all.slice(dataStart);
                var dr = data.length;
                var thuongCols = [];
                for (var ci = 0; ci < dc; ci++) {
                    if (headerKey(hd[ci]).indexOf('thuong') !== -1) thuongCols.push(ci);
                }

                var h = '';
                if (useDualHeader) {
                    h = buildMergedHeader([hd, maybeSecondHeader], dc);
                } else if (useCompositeHeader) {
                    h = buildCompositeHeader(hd, dc);
                } else {
                    h = '<tr><th>STT</th>';
                    for (var i = 0; i < dc; i++) {
                        var hCls = columnClass(hd[i], i, hd);
                        h += '<th class="' + hCls + '">' + esc(hd[i] || ('Cột ' + (i + 1))) + '</th>';
                    }
                    h += '</tr>';
                }

                /* Pre-compute nature map for body tinting */
                var colNatureMap = [];
                for (var cm = 0; cm < dc; cm++) {
                    colNatureMap.push(colNatureGroup(hd[cm]));
                }

                /* Detect which columns are "info" (first N info columns = white bg) */
                var infoColCount = 0;
                for (var ic = 0; ic < dc; ic++) {
                    if (colNatureMap[ic] === 'info') infoColCount++;
                    else break;
                }

                var isPolicy = cfg.prefix === 'po';
                var si = [];
                for (var r = 0; r < dr; r++) si.push(r);
                si.sort(function(a, b) { return TD_ced(data[b] || [], dc) - TD_ced(data[a] || [], dc); });

                var b = '';
                for (var k = 0; k < si.length; k++) {
                    var rowIndex = si[k], rc = data[rowIndex] || [];
                    b += '<tr data-row-index="' + rowIndex + '"><td class="pst">' + (rowIndex + 1) + '</td>';
                    for (var c = 0; c < dc; c++) {
                        var val = rc[c] || '';
                        var rawVal = String(val).trim();
                        var headerText = hd[c] || ('Cột ' + (c + 1));
                        var headerKey_ = headerKey(headerText);
                        var isAchCode = rawVal === '10000001111';
                        var isDatText = rawVal.toLowerCase() === 'đạt';
                        var isThuongCol = /col-thuong-cell/.test(columnClass(headerText, c, hd));
                        var isPercentCol = /cell-percent/.test(cellClass(headerText, rawVal, rawVal, c, hd, isPolicy));
                        var displayVal = formatCell(val, headerText);
                        /* Cell content with formatting */
                        var cellContent;
                        if (isAchCode) {
                            cellContent = '<span class="ach-pill"><i class="fa-solid fa-circle-check" style="margin-right:3px"></i>Đạt</span>';
                        } else if (isDatText) {
                            /* ĐẠT → vàng nền, xanh dương chữ */
                            cellContent = '<span class="dat-badge"><i class="fa-solid fa-circle-check" style="margin-right:3px"></i>' + esc(displayVal) + '</span>';
                        } else if (isThuongCol && rawVal && rawVal !== '0') {
                            /* THƯỞNG → icon + bold + xanh dương */
                            cellContent = '<span class="thuong-val"><i class="fa-solid fa-trophy"></i> ' + esc(displayVal) + '</span>';
                        } else if (isPercentCol && rawVal) {
                            /* TỶ LỆ → bold + đỏ */
                            var isNeg = /^-/.test(String(displayVal).trim());
                            cellContent = '<span class="percent-val' + (isNeg ? ' neg' : '') + '">' + esc(displayVal) + '</span>';
                        } else {
                            cellContent = esc(displayVal);
                        }
                        var colCls = columnClass(headerText, c, hd);
                        if (isAchCode) colCls += ' ach-cell';
                        var cCls = cellClass(headerText, rawVal, displayVal, c, hd, isPolicy);
                        /* 4 cột đầu info → trắng */
                        if (c < infoColCount) {
                            cCls = cCls.replace(/ct-\w+(-lv\d+)?/g, '');
                        }
                        /* Negative value highlight for percent columns */
                        if (/cell-percent/.test(cCls) && /^-/.test(String(displayVal).trim())) cCls += ' neg';
                        /* Policy columns 3+ get po-cc */
                        if (isPolicy && c >= infoColCount) cCls += ' po-cc';
                        /* Code columns → không tô màu (sau khi thêm po-cc) */
                        if (/col-code/.test(colCls)) {
                            cCls = cCls.replace(/ct-\w+(-lv\d+)?/g, '');
                            cCls = cCls.replace(/po-cc/g, '');
                        }
                        b += '<td class="' + cCls + '">' + cellContent + '</td>';
                    }
                    b += '</tr>';
                }

                var shouldAutoWide = dc <= 10;
                var wrapCls = isPolicy ? 'po-ptw' + (shouldAutoWide ? ' po-auto-wide' : '') : 'ptw' + (shouldAutoWide ? ' auto-wide' : '');
                var tblCls = isPolicy ? 'po-pt' : 'pt';
                var tableHtml = '<div class="' + wrapCls + '"><table class="' + tblCls + '"><thead>' + h + '</thead><tbody>' + b + '</tbody></table></div>';
                ct.innerHTML = tableHtml;
                TD_attachGroupFilter(ct, groupCol, 1);

                /* Fix sticky top for 2nd+ header row - use multiple attempts for accurate height */
                function fixStickyTop() {
                    var thead = ct.querySelector('thead');
                    if (thead && thead.rows.length > 1) {
                        var cumTop = 0;
                        for (var r = 0; r < thead.rows.length; r++) {
                            var rowH = thead.rows[r].getBoundingClientRect().height;
                            if (r > 0 && rowH > 0) {
                                var cells = thead.rows[r].cells;
                                for (var c = 0; c < cells.length; c++) {
                                    cells[c].style.top = cumTop + 'px';
                                }
                            }
                            cumTop += rowH;
                        }
                    }
                }
                requestAnimationFrame(function() { requestAnimationFrame(fixStickyTop); });
                setTimeout(fixStickyTop, 300);
                setTimeout(fixStickyTop, 800);

                ct.querySelectorAll('tbody tr').forEach(function(row) {
                    row.addEventListener('click', function() {
                        ct.querySelectorAll('tbody tr.is-focus').forEach(function(activeRow) {
                            activeRow.classList.remove('is-focus');
                        });
                        row.classList.add('is-focus');
                    });
                });
            }

            function buildHTML() {
                return '<div class="td-bg-a"></div><div class="tw" id="' + P + 'Tw"></div>' +
                    '<nav class="td-topnav"><div class="max-w-6xl mx-auto px-5 py-3 flex items-center justify-between">' +
                    '<div class="flex items-center gap-3">' +
                    '<button class="admin-btn" onclick="go(\'view-main\')" aria-label="Quay lại"><i class="fa-solid fa-arrow-left"></i></button>' +
                    '<span class="td-sub-title">' + esc(cfg.title) + '</span></div>' +
                    '<div class="flex items-center gap-3">' +
                    '<span class="sync-badge" id="' + P + 'SyncOk" style="display:none"><i class="fa-solid fa-cloud"></i>Đã đồng bộ</span>' +
                    '<span class="err-badge" id="' + P + 'SyncErr" style="display:none"><i class="fa-solid fa-cloud-xmark"></i>Lỗi</span>' +

g</button></div><div class="grid grid-cols-2 gap-3"><div><input type="number" class="inp" id="' + P + 'MCols" placeholder="Cột" min="1" max="20"></div><div><input type="number" class="inp" id="' + P + 'MRows" placeholder="Hàng" min="1" max="500"></div></div></div></div><div class="flex gap-3 mt-6"><button onclick="' + pv + '.savePrg()" class="bp flex-1"><i class="fa-solid fa-check mr-2"></i>Lưu lên Sheet</button><button onclick="' + pv + '.cm()" class="bs">Huỷ</button></div></div></div>' +
                    '<div class="cfm-bg" id="' + P + 'CfmDel"><div class="cfm-box"><i class="fa-solid fa-triangle-exclamation text-3xl mb-3" style="color:var(--td-red)"></i><p class="text-base font-semibold mb-1">Xóa chương trình?</p><p class="text-sm mb-5" style="color:var(--td-fgm)" id="' + P + 'CfmTxt"></p></div><div class="flex gap-3 justify-center"><button onclick="' + pv + '.ddl()" class="bp text-sm px-5" style="background:linear-gradient(135deg,var(--td-red),#8a2a22);border-radius:8px"><i class="fa-solid fa-trash mr-1"></i>Xóa</button><button onclick="' + pv + '.ccf()" class="bs text-sm px-5">Huỷ</button></div></div></div>';
            }

            function init() {
                var container = gid(cfg.containerId);
                if (!s.inited) {
                    container.innerHTML = buildHTML();
                    gid(P + 'PwInp').addEventListener('keydown', function(e) { if (e.key === 'Enter') spw(); });
                    gid(P + 'Mdl').addEventListener('click', function(e) { if (e.target === e.currentTarget) cm(); });
                    gid(P + 'Popup').addEventListener('click', function(e) { if (e.target === e.currentTarget) cpop(); });
                    document.addEventListener('click', function(e) {
                        if (gid(P + 'AdmWrap') && !gid(P + 'AdmWrap').contains(e.target)) {
                            s.ddOpen = false;
                            gid(P + 'AdmDD').classList.remove('show');
                        }
                    });
                    s.inited = true;
                }
                ca();
                lfs();
            }


            return {
                gid: gid, init: init, togDD: togDD, admAdd: admAdd, admReload: admReload, admOut: admOut, admLock: admLock, na: na, spw: spw, cpw: cpw, cpop: cpop, rpop: rpop, efp: efp, cm: cm, autoDet: autoDet, savePrg: savePrg, ad: ad, ccf: ccf, ddl: ddl, oe: oe, op: op
            };

        });

        var clbPage = createTDPage({
            prefix: 'cb', varName: 'clbPage', containerId: 'view-clb', title: 'CLB Sao Việt', badge: 'CLB', badgeIcon: 'fa-star', emptyTitle: 'Chưa có chương trình CLB nào', emptyDesc: 'Nhấn icon <i class="fa-solid fa-user-shield" style="color:var(--td-accent)"></i> để quản trị.', useSheetLayout: false, filterFn: function(n) { return /CLB/i.test(n); }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                [tdPage, poPage, clbPage].forEach(function(pg) {

                    ['PwMdl', 'CfmDel', 'Mdl', 'Popup'].forEach(function(s) {
                        var el = pg.gid(s);
                        if (el && el.classList.contains('open')) {
                            if (s === 'PwMdl') pg.cpw();
                            else if (s === 'CfmDel') pg.ccf();
                            else if (s === 'Popup') pg.cpop();
                            else if (s === 'Mdl') pg.cm();
                        }
                    });
                });
            }
        });

        function renderTodayPill() {
            var el = document.getElementById('today-pill');
            if (!el) return;
            var d = new Date();
            var dd = String(d.getDate()).padStart(2, '0');
            var mm = String(d.getMonth() + 1).padStart(2, '0');
            var yy = d.getFullYear();
            el.innerHTML = '<i class="fa-solid fa-calendar-day"></i><span class="cdp-day">' + dd + '/' + mm + '/' + yy + '</span>';
        }
        renderTodayPill();
        setInterval(renderTodayPill, 60000);

        syncData();
    </script>

    <!-- PWA Install Banner -->
    <div class="pwa-banner" id="pwa-banner">
        <div class="pwa-banner-icon"><i class="fa-solid fa-download"></i></div>
        <div class="pwa-banner-text">
            <strong>Cài đặt ứng dụng</strong>
            Truy cập nhanh hơn từ màn hình chính
        </div>
        <button class="pwa-banner-btn" id="pwa-install-btn">Cài đặt</button>
        <button class="pwa-banner-close" id="pwa-close-btn">&times;</button>
    </div>
    <script>
    (function() {
        var dismissed = localStorage.getItem('pwa_dismissed');
        var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
        var banner = document.getElementById('pwa-banner');
        var installBtn = document.getElementById('pwa-install-btn');
        var closeBtn = document.getElementById('pwa-close-btn');
        var deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            if (!dismissed && !isStandalone) {
                setTimeout(function() {
                    banner.classList.add('show');
                    document.body.classList.add('has-pwa-banner');
                }, 3000);
            }
        });

        installBtn.addEventListener('click', function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(choice) {
                    if (choice.outcome === 'accepted') {
                        banner.classList.remove('show');
                        document.body.classList.remove('has-pwa-banner');
                    }
                    deferredPrompt = null;
                });
            }
        });

        closeBtn.addEventListener('click', function() {
            banner.classList.remove('show');
            document.body.classList.remove('has-pwa-banner');
            localStorage.setItem('pwa_dismissed', '1');
        });

        window.addEventListener('appinstalled', function() {
            banner.classList.remove('show');
            document.body.classList.remove('has-pwa-banner');
            deferredPrompt = null;
        });
    })();

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js').then(function(reg) {
                console.log('Service Worker registered, scope:', reg.scope);
            }).catch(function(err) {
                console.log('Service Worker registration failed:', err);
            });
        });
    }
    </script>
